name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm exec next typegen

      - run: pnpm tsc --noEmit --incremental false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm format:check

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm test

  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec react-doctor --yes --no-telemetry --json . | tee react-doctor.json

      - run: node -e "const r=require('./react-doctor.json'); if(r.summary.errorCount>0) process.exit(1)"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, format]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.34.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Create Neon E2E branch
        id: neon-e2e-branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          RUN_ID: ${{ github.run_id }}
        run: |
          RESPONSE=$(curl -sf -X POST \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            --data "$(jq -nc --arg run "$RUN_ID" '{"branch":{"name":"e2e-\($run)"},"endpoints":[{"type":"read_write"}]}')")
          BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
          # Direct (unpooled) URL — required for DDL migrations (PgBouncer blocks DDL)
          DB_URL_DIRECT=$(echo "$RESPONSE" | jq -r '.connection_uris[0].connection_uri')
          # Pooled URL — insert -pooler into endpoint hostname, matching the repo convention
          DB_URL_POOLED=$(echo "$DB_URL_DIRECT" | sed 's|@\([^.]*\)\.|@\1-pooler.|')
          echo "branch_id=$BRANCH_ID" >> "$GITHUB_OUTPUT"
          echo "DATABASE_URL=$DB_URL_POOLED" >> "$GITHUB_ENV"
          echo "DATABASE_URL_UNPOOLED=$DB_URL_DIRECT" >> "$GITHUB_ENV"

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('**/pnpm-lock.yaml') }}

      - run: pnpm exec playwright install chromium --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Run DB migrations
        run: pnpm db:migrate

      - run: pnpm test:e2e
        env:
          # e2e runs against a production build (next build && next start) so PPR
          # / 'use cache' behave as in prod. E2E_TESTING re-opens the gallery
          # cache-bust route, which is otherwise closed under NODE_ENV=production.
          E2E_TESTING: "1"
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:3000
          OWNER_EMAIL: admin@lacourdehaut.fr
          OWNER_PASSWORD: ${{ secrets.OWNER_PASSWORD }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

      - name: Delete Neon E2E branch
        if: always()
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          BRANCH_ID: ${{ steps.neon-e2e-branch.outputs.branch_id }}
        run: |
          if [ -n "$BRANCH_ID" ]; then
            curl -sf -X DELETE \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$BRANCH_ID" \
              -H "Authorization: Bearer $NEON_API_KEY" || true
          fi
