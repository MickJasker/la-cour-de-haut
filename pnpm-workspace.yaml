trustPolicy: no-downgrade
# Backport releases published after newer majors gained provenance/trusted
# publishing — pnpm orders trust by publish date, so these look like
# downgrades but are legitimate (see pnpm/pnpm discussion #11084).
trustPolicyExclude:
  - semver@6.3.1
  - eslint-import-resolver-typescript@3.10.1

packages:
  - .

# pnpm 11 replaces onlyBuiltDependencies/ignoredBuiltDependencies with this
# map; unlisted packages with build scripts fail the install (strictDepBuilds).
allowBuilds:
  esbuild: false
  lefthook: true
  protobufjs: false
  sharp: false
  unrs-resolver: false
